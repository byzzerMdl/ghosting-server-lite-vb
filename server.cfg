// Ghosling server configuration.
//
// Format: one "key value" per line. // or # starts a comment.
// This file is loaded automatically from the working directory; point
// elsewhere with --config PATH. Command-line flags override these values.

// --- network ---
host             127.0.0.1     // interface to bind; use 0.0.0.0 for LAN/public
port             2228          // main UDP port players connect to

// --- plugins ---
plugins_enabled  true          // load plugins at all (Lua + Python)
plugins          plugins       // directory to load .lua / .py plugins from

// --- gameplay ---
maxplayers       16            // max concurrent players (overrides MAX_PLAYERS env)

// --- GHMTV spectator relay (SourceTV-style) ---
tv               false         // run the spectator relay on a separate port
tv_port          2233          // GHMTV port (default would be port + 5)

// --- logging ---
showplayerpos    false         // print every player's map + position ~1 Hz
quiet            false         // suppress per-event logging
